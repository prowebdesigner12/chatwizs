<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ChatWizs - Advanced Messaging Platform</title>
    <script>
      // Robust fix for "Cannot set property fetch of #<Window> which has only a getter"
      (function() {
        try {
          const originalFetch = window.fetch;
          Object.defineProperty(window, 'fetch', {
            configurable: true,
            enumerable: true,
            get: function() {
              return originalFetch;
            },
            set: function(value) {
              console.warn('Intercepted attempt to overwrite window.fetch');
              // We can choose to ignore the assignment or allow it by updating a local ref
              // but the main goal is to prevent the "only a getter" TypeError.
            }
          });
        } catch (e) {
          console.warn('Could not redefine window.fetch:', e);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
